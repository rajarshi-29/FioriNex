<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAP Fiori – P2P Prototype | FioriNex Pvt Ltd</title>
  <script id="sap-ui-bootstrap"
    src="https://openui5.hana.ondemand.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.ui.layout,sap.f,sap.ui.core"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-resourceroots='{"fiori.p2p": "./webapp"}'>
  </script>
  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ui.require(
        ["sap/m/Shell", "sap/ui/core/ComponentContainer"],
        function (Shell, ComponentContainer) {
          new Shell({
            title: "FioriNex Pvt Ltd",
            appWidthLimited: false,
            app: new ComponentContainer({
              name: "fiori.p2p",
              height: "100%",
              settings: { id: "p2pComponent" }
            })
          }).placeAt("content");
        }
      );
    });
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
